<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — TicketGuard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">TICKET<span>GUARD</span></a>
  <div class="nav-links">
    <a href="index.html">Events</a>
    <a href="bookings.html" class="active">My Bookings</a>
  </div>
  <div style="display:flex; gap:0.75rem; align-items:center;">
    <span id="nav-user-info" style="font-size:0.8rem; color:var(--muted);"></span>
    <div class="nav-auth"></div>
  </div>
</nav>

<div class="container page">
  <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem;">
    <div>
      <h1 class="page-title">MY BOOKINGS</h1>
      <p class="page-subtitle">Your ticket history and upcoming events</p>
    </div>
    <a href="index.html" class="btn btn-outline">Browse Events</a>
  </div>

  <!-- FILTER TABS -->
  <div style="display:flex; gap:0.5rem; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1rem;">
    <button class="btn btn-ghost btn-sm filter-btn active" onclick="filterBookings('all', this)">All</button>
    <button class="btn btn-ghost btn-sm filter-btn" onclick="filterBookings('confirmed', this)">Confirmed</button>
    <button class="btn btn-ghost btn-sm filter-btn" onclick="filterBookings('pending', this)">Pending</button>
    <button class="btn btn-ghost btn-sm filter-btn" onclick="filterBookings('cancelled', this)">Cancelled</button>
  </div>

  <!-- BOOKINGS LIST -->
  <div id="bookings-container">
    <div style="display:flex; align-items:center; gap:0.75rem; color:var(--muted); font-size:0.85rem;">
      <span class="spinner"></span> Loading bookings...
    </div>
  </div>
</div>

<!-- BOOKING DETAIL MODAL -->
<div class="modal-overlay" id="booking-detail-modal">
  <div class="modal" style="max-width:540px;">
    <h2 class="modal-title">BOOKING DETAILS</h2>
    <div id="booking-detail-content"></div>
    <div class="modal-actions" style="margin-top:1.5rem;">
      <button class="btn btn-outline btn-full" onclick="closeModal('booking-detail-modal')">Close</button>
    </div>
  </div>
</div>

<!-- CANCEL CONFIRM MODAL -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <h2 class="modal-title">CANCEL BOOKING</h2>
    <p class="modal-subtitle">Are you sure you want to cancel this booking? Your refund will be processed within 5-7 business days.</p>
    <div class="modal-actions">
      <button class="btn btn-danger btn-full" id="cancel-confirm-btn">Yes, Cancel Booking</button>
      <button class="btn btn-outline" onclick="closeModal('cancel-modal')">Keep Booking</button>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script src="js/bookings.js"></script>
</body>
</html>
