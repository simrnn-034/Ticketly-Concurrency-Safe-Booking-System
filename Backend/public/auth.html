<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TicketGuard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">TICKET<span>GUARD</span></a>
  <div class="nav-links">
    <a href="index.html">Events</a>
  </div>
  <div class="nav-auth"></div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">TICKET<span style="color:var(--text);">GUARD</span></div>
    <p class="auth-subtitle">Secure, concurrent-safe ticket booking</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="login-tab" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="register-tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-gold btn-full btn-lg" id="login-btn" onclick="login()" style="margin-top:0.5rem;">
        Sign In
      </button>

      <div style="margin-top:1.25rem; text-align:center; font-size:0.78rem; color:var(--muted);">
        Demo accounts: user@test.com or organizer@test.com · password123
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" id="reg-phone" placeholder="+91 98765 43210" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters" />
      </div>
      <div class="form-group">
        <label>Account Type</label>
        <select id="reg-role">
          <option value="user">User — Book tickets</option>
          <option value="organizer">Organizer — Create events</option>
        </select>
      </div>
      <button class="btn btn-gold btn-full btn-lg" id="register-btn" onclick="register()" style="margin-top:0.5rem;">
        Create Account
      </button>
    </div>

    <div id="auth-error" style="display:none; margin-top:1rem; padding:0.75rem; background:rgba(224,82,82,0.1); border:1px solid var(--red); border-radius:4px; font-size:0.8rem; color:var(--red);"></div>
  </div>
</div>

<script src="utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
